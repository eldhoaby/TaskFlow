# ============================================
# TaskFlow - Application Configuration
# ============================================
# This file configures our Spring Boot application.
# Think of it as a .env file in Node.js projects.

# --------------------------------------------
# MongoDB Atlas Connection
# --------------------------------------------
# IMPORTANT: Replace <username>, <password>, and <cluster-url> with your
# actual MongoDB Atlas credentials.
#
# How to get your connection string:
# 1. Go to https://cloud.mongodb.com
# 2. Click "Connect" on your cluster
# 3. Choose "Connect your application"
# 4. Select "Java" driver
# 5. Copy the connection string and paste it below
#
# Example: mongodb+srv://john:mypassword123@cluster0.abc123.mongodb.net/taskflow
spring.data.mongodb.uri=mongodb+srv://<username>:<password>@<cluster>.mongodb.net/taskflow?retryWrites=true&w=majority

# --------------------------------------------
# Server Configuration
# --------------------------------------------
# The port our backend server runs on (default: 8080)
# Frontend will call http://localhost:8080/api/tasks
server.port=8080

# --------------------------------------------
# Application Name
# --------------------------------------------
spring.application.name=TaskFlow
